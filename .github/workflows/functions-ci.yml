name: Functions CI and Deploy

on:
  push:
    branches: [main, master]
    paths:
      - "functions/**"
      - "firestore.rules"
      - "firestore.indexes.json"
      - "storage.rules"
      - "firebase.json"
      - ".firebaserc"
      - ".github/workflows/functions-ci.yml"
  pull_request:
    branches: [main, master]
    paths:
      - "functions/**"
      - "firestore.rules"
      - "firestore.indexes.json"
      - "storage.rules"
      - "firebase.json"
      - ".firebaserc"
      - ".github/workflows/functions-ci.yml"
  workflow_dispatch:
    inputs:
      deploy:
        description: "Deploy Functions + rules to Firebase (requires FIREBASE_TOKEN secret)"
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: functions-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Functions tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: functions
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  deploy:
    name: Deploy Firebase Functions and rules
    needs: test
    if: >
      github.event_name == 'workflow_dispatch' &&
      inputs.deploy == 'true' &&
      github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Install Functions dependencies
        working-directory: functions
        run: npm ci

      - name: Install Firebase CLI
        run: npm install -g firebase-tools@13

      - name: Require FIREBASE_TOKEN
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          if [ -z "$FIREBASE_TOKEN" ]; then
            echo "Add repo secret FIREBASE_TOKEN (from: firebase login:ci) before deploying."
            exit 1
          fi

      - name: Deploy Functions, Firestore rules/indexes, Storage rules
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          FIREBASE_CLI_DISABLE_UPDATE_CHECK: "true"
        run: |
          firebase deploy \
            --only functions,firestore,storage \
            --project shoutoutdemo-5b402 \
            --non-interactive
