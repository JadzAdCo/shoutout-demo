<!doctype html>
<html lang="en">
<head>
  <!-- FLOQR Mingl Chat v28.96-mingl-main-chat-card-removal -->
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Mingl Chat</title>
  <link rel="stylesheet" href="./styles.css?v=28.96-mingl-main-chat-card-removal"/>
  <link rel="stylesheet" href="./admin.css?v=28.96-mingl-main-chat-card-removal"/>
</head>
<body>
<main class="app admin-shell">
  <a class="global-back-btn buttonlike" href="./?v=28.96-mingl-main-chat-card-removal">&larr; Back to Mingl</a>
  <section class="page active">
    <header class="topbar">
      <div>
        <p class="eyebrow">MINGL / CHAT</p>
        <h1>Mingl Chat</h1>
        <p class="sub">Chat opens after both patrons Mingl back.</p>
        <p id="minglChatSignedInAs" class="status">Checking sign-in...</p>
        <p id="minglChatStatus" class="status"></p>
      </div>
    </header>

    <div id="minglChatLogin" class="card hidden">
      <h2>Sign in</h2>
      <p class="sub small">Sign in to open your Mingl chats.</p>
      <button id="minglChatGoogleLoginBtn" class="auth-btn" type="button">Continue with Google</button>
      <button id="minglChatMicrosoftLoginBtn" class="auth-btn" type="button">Continue with Microsoft</button>
    </div>

    <div id="minglChatShell" class="mingl-layout hidden">
      <div id="minglStandaloneChatCard" class="card mingl-chat-popout hidden" aria-hidden="true">
        <h2>Chats <span id="minglStandaloneCount">(0/0)</span></h2>
        <div id="minglStandaloneList" class="mingl-chat-list"></div>
      </div>
      <div class="card">
        <div class="mingl-chat-header">
          <div id="minglStandaloneAvatar" class="mingl-chat-avatar">M</div>
          <div>
            <h2 id="minglStandaloneTitle">Select a Mingl Chat</h2>
            <p id="minglStandaloneRoomStatus" class="sub small">Choose a mutual chat from the list.</p>
          </div>
          <button id="minglStandaloneCloseChatBtn" class="mingl-chat-close" type="button" aria-label="Close Mingl chat">&times;</button>
        </div>
        <input id="minglStandaloneBackgroundInput" class="visually-hidden-file" type="file" accept="image/*"/>
        <input id="minglStandaloneImageInput" class="visually-hidden-file" type="file" accept="image/*,video/*"/>
        <div id="minglStandaloneAttachmentPreview" class="mingl-attachment-preview hidden"></div>
        <div id="minglStandaloneMessages" class="mingl-messages"></div>
        <p id="minglStandaloneGrammarHint" class="grammar-hint hidden"></p>
        <div class="mingl-compose mingl-compose-clean">
          <input id="minglStandaloneMessageInput" maxlength="600" placeholder="Write a Mingl message..."/>
          <button id="minglStandaloneSendBtn" class="primary" type="button">Send</button>
          <details id="minglStandaloneActionMenu" class="mingl-compose-menu">
            <summary aria-label="Mingl message actions">+</summary>
            <div class="mingl-compose-menu-panel">
              <strong>Text Action</strong>
              <button id="minglStandaloneImproveBtn" type="button">Correct Grammar/Spelling</button>
              <div class="emoji-row compact-emoji-row" aria-label="Mingl emoji shortcuts">
                <button type="button" data-mingl-emoji-code="128522">Smile</button>
                <button type="button" data-mingl-emoji-code="128293">Fire</button>
                <button type="button" data-mingl-emoji-code="127881">Party</button>
                <button type="button" data-mingl-emoji-code="10084">Heart</button>
                <button type="button" data-mingl-emoji-code="128514">Laugh</button>
              </div>
              <strong>Add Photo/Video</strong>
              <label class="chat-file-button" for="minglStandaloneImageInput">Choose Photo/Video</label>
              <button id="minglStandaloneClearImageBtn" type="button">Remove Photo/Video</button>
              <strong>Edit</strong>
              <button id="minglStandaloneSelectDraftBtn" type="button">Select Draft Text</button>
              <button id="minglStandaloneClearDraftBtn" type="button">Clear Draft</button>
              <strong>Chat Background</strong>
              <label class="chat-file-button" for="minglStandaloneBackgroundInput">Change Background</label>
            </div>
          </details>
        </div>
      </div>
    </div>
  </section>
</main>

<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-storage-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-functions-compat.js"></script>
<script src="./firebase-config.js?v=28.96-mingl-main-chat-card-removal"></script>
<script src="./shared-data.js?v=28.96-mingl-main-chat-card-removal"></script>
<script src="./ai-grammar-service.js?v=28.96-mingl-main-chat-card-removal"></script>
<script src="./helper-popouts.js?v=28.96-mingl-main-chat-card-removal"></script>
<script src="./mingl-chat-app.js?v=28.96-mingl-main-chat-card-removal"></script>
</body>
</html>
