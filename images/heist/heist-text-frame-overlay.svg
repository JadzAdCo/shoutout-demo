<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" preserveAspectRatio="none" aria-hidden="true">
  <defs>
    <filter id="heistGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Neon outer glow -->
  <rect x="34" y="34" width="932" height="932" rx="54" fill="none" stroke="#ff1a6e" stroke-width="12" filter="url(#heistGlow)" opacity="0.95"/>
  <!-- Black frame body -->
  <rect x="46" y="46" width="908" height="908" rx="46" fill="none" stroke="#101010" stroke-width="24"/>
  <!-- White inner lip -->
  <rect x="60" y="60" width="880" height="880" rx="38" fill="none" stroke="#ffffff" stroke-width="4"/>
  <!-- Side tabs -->
  <rect x="468" y="22" width="64" height="18" rx="4" fill="#101010"/>
  <rect x="468" y="960" width="64" height="18" rx="4" fill="#101010"/>
  <rect x="22" y="468" width="18" height="64" rx="4" fill="#101010"/>
  <rect x="960" y="468" width="18" height="64" rx="4" fill="#101010"/>
  <!-- Three-line guides (3 rows) -->
  <line x1="88" y1="333" x2="912" y2="333" stroke="#ff6688" stroke-width="2.5" opacity="0.5"/>
  <line x1="88" y1="666" x2="912" y2="666" stroke="#ff6688" stroke-width="2.5" opacity="0.5"/>
</svg>
