<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" role="img" aria-label="Cuisine Bantu FLOQR advertisement">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop stop-color="#15111d"/>
      <stop offset=".48" stop-color="#342012"/>
      <stop offset="1" stop-color="#0b3c35"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1">
      <stop stop-color="#ff3db8"/>
      <stop offset=".45" stop-color="#ff9a3d"/>
      <stop offset="1" stop-color="#62eaff"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="9" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="900" height="520" rx="48" fill="url(#bg)"/>
  <circle cx="120" cy="105" r="120" fill="#ff9a3d" opacity=".22"/>
  <circle cx="760" cy="420" r="155" fill="#62eaff" opacity=".14"/>
  <path d="M61 361c69-76 136-105 201-85 78 25 139 4 199-63 75-84 166-97 274-37" fill="none" stroke="url(#accent)" stroke-width="16" stroke-linecap="round" opacity=".72"/>
  <rect x="76" y="70" width="748" height="380" rx="42" fill="#070815" opacity=".58" stroke="url(#accent)" stroke-width="3"/>
  <text x="450" y="165" fill="#fff" font-family="Arial, Helvetica, sans-serif" font-size="74" font-weight="900" text-anchor="middle" letter-spacing="2">CUISINE BANTU</text>
  <text x="450" y="217" fill="#dfff5a" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="800" text-anchor="middle">BANTU FUSION DINING</text>
  <g filter="url(#glow)">
    <circle cx="300" cy="306" r="54" fill="#ff9a3d"/>
    <circle cx="450" cy="306" r="54" fill="#dfff5a"/>
    <circle cx="600" cy="306" r="54" fill="#21d6c7"/>
  </g>
  <text x="450" y="394" fill="#f4f6ff" font-family="Arial, Helvetica, sans-serif" font-size="29" font-weight="700" text-anchor="middle">African + Caribbean flavor for spice lovers</text>
  <text x="450" y="435" fill="#bfc7eb" font-family="Arial, Helvetica, sans-serif" font-size="22" text-anchor="middle">Target: foodies, diaspora dining, Rowlett/Dallas nightlife</text>
  <text x="450" y="480" fill="#ffffff" opacity=".62" font-family="Arial, Helvetica, sans-serif" font-size="18" text-anchor="middle">demo ad campaign</text>
</svg>
