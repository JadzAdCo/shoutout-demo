<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Request Admin / DJ / Promoter Access</title>
  <link rel="stylesheet" href="./styles.css"/>
  <link rel="stylesheet" href="./admin.css"/>
</head>
<body>
<main class="app admin-shell">
  <a class="global-back-btn buttonlike" href="./patron-portal.html?v=28.15">← Back</a>
  <section class="page active">
    <header class="topbar">
      <div>
        <p class="eyebrow">Role Request</p>
        <h1>Request additional access</h1>
        <p class="sub">All users start as regular patrons. Request Club Admin, DJ, or Promoter access here.</p>
        <p id="roleSignedInAs" class="status">Not signed in</p>
        <p id="roleStatus" class="status">Loading...</p>
      </div>
    </header>
    <div id="roleLogin" class="card">
      <button id="roleGoogleLoginBtn" type="button">Continue with Google</button>
    </div>
    <div id="roleForm" class="card hidden">
      <h2>Additional Access Request</h2>
      <div class="profile-grid">
        <label>Request Type
          <select id="requestType">
            <option value="clubAdmin">Club Admin</option>
            <option value="dj">DJ</option>
            <option value="promoter">Promoter</option>
          </select>
        </label>
        <label>Public / Company / DJ Name<input id="publicName" placeholder="DJ Nova, ABC Promotions, etc."/></label>
        <label>Instagram<input id="instagram"/></label>
        <label>Phone<input id="phone"/></label>
        <label>Website / Link<input id="website"/></label>
      </div>
      <label>Select one or more clubs/events you work with
        <select id="relatedLocations" multiple size="8"></select>
      </label>
      <label>Notes<textarea id="roleNotes" placeholder="Explain your role, clubs, events, promoter company, residency, or admin relationship."></textarea></label>
      <button id="submitRoleRequestBtn" class="primary" type="button">Submit Request</button>
      <a href="./patron-portal.html?v=28.15">Back to My Profile</a>
    </div>
  </section>
</main>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
<script src="./firebase-config.js?v=28.15"></script>
<script src="./shared-data.js?v=28.15"></script>
<script src="./role-request-app.js?v=28.15"></script>
</body>
</html>
