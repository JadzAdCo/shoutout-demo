<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>FLOQR — All jersey previews (demo name / number)</title>
  <style>
    :root {
      --bg: #0e1014;
      --ink: #f2f4f7;
      --muted: #9aa3af;
      --line: #242830;
      --chip: #1a1e26;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--ink);
    }
    header {
      position: sticky;
      top: 0;
      z-index: 5;
      padding: 14px 18px 12px;
      background: rgba(14,16,20,.94);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(8px);
    }
    h1 { margin: 0 0 4px; font-size: 1.15rem; font-weight: 700; letter-spacing: .02em; }
    .sub { margin: 0; color: var(--muted); font-size: .86rem; }
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
      align-items: center;
    }
    .toolbar input, .toolbar select {
      background: var(--chip);
      color: var(--ink);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px 10px;
      font: inherit;
    }
    .toolbar input { min-width: 220px; flex: 1; }
    .count { color: var(--muted); font-size: .82rem; }
    main { padding: 16px 18px 40px; }
    section { margin-bottom: 28px; }
    section h2 {
      margin: 0 0 12px;
      font-size: .95rem;
      font-weight: 650;
      color: var(--muted);
      letter-spacing: .04em;
      text-transform: uppercase;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(168px, 1fr));
      gap: 14px;
    }
    a.card {
      display: block;
      text-decoration: none;
      color: inherit;
      border: 1px solid var(--line);
      border-radius: 12px;
      overflow: hidden;
      background: #12151b;
    }
    a.card:hover { border-color: #3a4250; }
    .board {
      position: relative;
      aspect-ratio: 2 / 1;
      background:
        linear-gradient(90deg,#1a1410 0%,#2a2118 12%,#1a1410 24%,#2c2219 36%,#18120e 48%,#2a2118 60%,#1a1410 72%,#2c2219 84%,#18120e 100%),
        #14100c;
      overflow: hidden;
    }
    .board.photo-back {
      background-color: #050505;
      background-size: cover;
      background-position: center top;
      background-repeat: no-repeat;
    }
    .mount {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }
    .hanger {
      position: absolute;
      left: 50%;
      top: 3%;
      width: 44%;
      height: 12%;
      transform: translateX(-50%);
      z-index: 3;
    }
    .hanger-hook {
      position: absolute;
      left: 50%;
      top: 0;
      width: 4%;
      height: 40%;
      transform: translateX(-50%);
      border: 1.5px solid #c8b48a;
      border-bottom: none;
      border-radius: 8px 8px 0 0;
    }
    .hanger-bar {
      position: absolute;
      left: 0;
      right: 0;
      top: 36%;
      height: 16%;
      background: linear-gradient(180deg,#e8d7b0,#8d6b3a);
      clip-path: polygon(0 45%,8% 0,92% 0,100% 45%,96% 100%,4% 100%);
    }
    .garment {
      position: absolute;
      left: 50%;
      top: 9%;
      width: 56%;
      height: 78%;
      transform: translateX(-50%);
      filter: drop-shadow(0 6px 10px rgba(0,0,0,.5));
    }
    .torso {
      position: absolute;
      left: 18%;
      right: 18%;
      top: 14%;
      bottom: 4%;
      background: linear-gradient(180deg,rgba(255,255,255,.12),rgba(0,0,0,.2)), var(--jp);
      border-radius: 0 0 10% 10%;
    }
    .collar {
      position: absolute;
      left: 38%;
      right: 38%;
      top: 8%;
      height: 8%;
      background: var(--js);
      border-radius: 0 0 40% 40%;
      z-index: 4;
    }
    .sleeve {
      position: absolute;
      top: 14%;
      width: 22%;
      height: 22%;
      background: var(--jp);
    }
    .sleeve.l { left: 0; border-radius: 18% 0 12% 28%; transform: skewY(8deg); }
    .sleeve.r { right: 0; border-radius: 0 18% 28% 12%; transform: skewY(-8deg); }
    .side {
      position: absolute;
      top: 34%;
      bottom: 8%;
      width: 5%;
      background: var(--js);
      z-index: 3;
    }
    .side.l { left: 18%; }
    .side.r { right: 18%; }
    .yoke, .plate { display: none; }
    .sport-nba .sleeve, .sport-nba .side { display: none; }
    .sport-nba .garment { width: 50%; }
    .sport-nba .torso {
      left: 12%;
      right: 12%;
      clip-path: polygon(0 12%,12% 0,88% 0,100% 12%,100% 100%,0 100%);
      background:
        repeating-linear-gradient(0deg,rgba(255,255,255,.05) 0 1px,transparent 1px 3px),
        var(--jp);
    }
    .sport-nba .collar { left: 34%; right: 34%; height: 10%; }
    .sport-nfl .side { display: none; }
    .sport-nfl .garment { width: 62%; }
    .sport-nfl .yoke {
      display: block;
      position: absolute;
      left: 14%;
      right: 14%;
      top: 12%;
      height: 15%;
      background: var(--js);
      clip-path: polygon(8% 0,92% 0,100% 100%,0 100%);
      z-index: 3;
    }
    .sport-nfl .plate {
      display: block;
      position: absolute;
      left: 22%;
      right: 22%;
      top: 22%;
      height: 9%;
      background: rgba(0,0,0,.35);
      border: 1px solid rgba(255,255,255,.18);
      z-index: 4;
    }
    .team, .name, .num {
      position: absolute;
      left: 10%;
      right: 10%;
      display: grid;
      place-items: center;
      color: #fff;
      font-family: Impact, "Arial Narrow", "Arial Black", Arial, sans-serif;
      font-weight: 1000;
      text-transform: uppercase;
      text-shadow: 0 1px 0 rgba(0,0,0,.55), 0 0 8px rgba(0,0,0,.35);
      margin: 0;
      padding: 0;
      overflow: hidden;
      white-space: nowrap;
      line-height: .95;
      z-index: 5;
    }
    .team {
      top: 16%;
      height: 10%;
      letter-spacing: .14em;
      font-size: clamp(7px, 3.2vw, 11px);
      transform: perspective(420px) rotateX(16deg);
      transform-origin: center bottom;
    }
    .name {
      top: 28%;
      height: 16%;
      letter-spacing: .08em;
      font-size: clamp(10px, 4.4vw, 14px);
      white-space: normal;
      text-align: center;
    }
    .num {
      top: 44%;
      height: 38%;
      letter-spacing: .04em;
      font-size: clamp(28px, 14vw, 46px);
      font-style: italic;
    }
    .sport-nba .team { transform: none; letter-spacing: .2em; top: 14%; }
    .sport-nba .name { transform: none; top: 24%; font-size: clamp(8px, 3.4vw, 12px); letter-spacing: .16em; }
    .sport-nba .num { top: 36%; font-style: normal; font-size: clamp(32px, 16vw, 52px); }
    .sport-nfl .team { display: none; }
    .sport-nfl .name { top: 22%; height: 10%; letter-spacing: .18em; font-size: clamp(8px, 3.2vw, 11px); }
    .sport-nfl .num { top: 34%; font-style: normal; font-size: clamp(34px, 17vw, 54px); text-shadow: 0 3px 0 #000, 0 0 12px rgba(0,0,0,.5); }
    .meta {
      padding: 8px 10px 10px;
      border-top: 1px solid var(--line);
    }
    .meta strong {
      display: block;
      font-size: .78rem;
      font-weight: 650;
      margin-bottom: 2px;
    }
    .meta span {
      display: block;
      color: var(--muted);
      font-size: .72rem;
    }
  </style>
</head>
<body>
  <header>
    <h1>All jersey previews</h1>
    <p class="sub">Every jersey on a hanger. Soccer = short-sleeve kit · NBA = sleeveless tank · NFL = yoke + name plate. Demo name/mark. Click for live LED URL.</p>
    <div class="toolbar">
      <input id="q" type="search" placeholder="Filter team, league, sport…" autocomplete="off"/>
      <select id="sport">
        <option value="all">All sports</option>
        <option value="soccer">Soccer</option>
        <option value="nba">NBA</option>
        <option value="nfl">NFL</option>
      </select>
      <span class="count" id="count"></span>
    </div>
  </header>
  <main id="root"></main>
  <script src="./jersey-catalog.js?v=29.09.54"></script>
  <script>
    const LIVE = "https://jadzadco.github.io/shoutout-demo";
    const FAKE_NAMES = ["NOVA", "RIVER", "BLAZE", "KAI", "MIRA", "ZED", "AXEL", "LUNA", "ORION", "SAGE", "REM", "VEX", "ION", "NYX"];
    const FAKE_MARKS = ["7", "10", "9", "11", "23", "99", "8", "17", "21", "3", "14", "22"];

    function hash(s) {
      let h = 0;
      for (let i = 0; i < String(s).length; i++) h = ((h << 5) - h + s.charCodeAt(i)) | 0;
      return Math.abs(h);
    }

    function demoFor(id) {
      const h = hash(id);
      return {
        name: FAKE_NAMES[h % FAKE_NAMES.length],
        mark: FAKE_MARKS[h % FAKE_MARKS.length]
      };
    }

    function teamLabel(row) {
      return String(row.jerseyTeamLabel || row.teamName || row.name || "")
        .replace(/^(Soccer|NBA|NFL)\s+/i, "")
        .trim()
        .toUpperCase();
    }

    function liveUrl(row, demo) {
      const label = encodeURIComponent(teamLabel(row));
      const primary = encodeURIComponent(row.jerseyPrimary || "#111111");
      const secondary = encodeURIComponent(row.jerseySecondary || "#ffffff");
      const css = row.jerseyCssBack || !row.defaultBackgroundUrl ? "1" : "0";
      if (row.sport === "soccer") {
        return `${LIVE}/display.html?location=heist-washington-dc&template=soccerJersey&jerseyTeamId=${encodeURIComponent(row.id)}&jerseyTeamLabel=${label}&jerseyPrimary=${primary}&jerseySecondary=${secondary}&jerseyCssBack=${css}&main=${encodeURIComponent(demo.name)}&sub=${encodeURIComponent(demo.mark)}&screen=led-64x32&preview=1&v=29.09.52`;
      }
      return `${LIVE}/display.html?location=heist-washington-dc&template=${encodeURIComponent(row.id)}&main=${encodeURIComponent(demo.name)}&sub=${encodeURIComponent(demo.mark)}&screen=led-64x32&preview=1&v=29.09.52`;
    }

    function collect() {
      const soccer = Object.values(window.FLOQR_SOCCER_TEAMS || {});
      const all = Object.values(window.FLOQR_JERSEY_CATALOG || {});
      const nbaNfl = all.filter(r => r.sport === "nba" || r.sport === "nfl");
      // Prefer unique soccer teams from FLOQR_SOCCER_TEAMS (skip legacy monaco dup if identical render).
      const seen = new Set();
      const rows = [];
      [...soccer, ...nbaNfl].forEach(row => {
        if (!row || !row.id || seen.has(row.id)) return;
        if (row.id === "soccerMonaco" && window.FLOQR_SOCCER_TEAMS.soccerASMonaco) return;
        seen.add(row.id);
        rows.push(row);
      });
      return rows;
    }

    function groupKey(row) {
      if (row.sport === "nba") return "NBA";
      if (row.sport === "nfl") return "NFL";
      return row.league || "Soccer";
    }

    function render() {
      const q = String(document.getElementById("q").value || "").trim().toLowerCase();
      const sport = document.getElementById("sport").value;
      let rows = collect().filter(row => {
        if (sport !== "all" && row.sport !== sport) return false;
        if (!q) return true;
        const hay = `${row.id} ${row.name} ${row.teamName} ${row.league} ${row.sport}`.toLowerCase();
        return hay.includes(q);
      });
      rows.sort((a, b) => {
        const ga = groupKey(a).localeCompare(groupKey(b));
        if (ga) return ga;
        return String(a.teamName || a.name).localeCompare(String(b.teamName || b.name));
      });
      document.getElementById("count").textContent = `${rows.length} jerseys`;

      const byGroup = new Map();
      rows.forEach(row => {
        const g = groupKey(row);
        if (!byGroup.has(g)) byGroup.set(g, []);
        byGroup.get(g).push(row);
      });

      const root = document.getElementById("root");
      root.innerHTML = "";
      byGroup.forEach((list, group) => {
        const sec = document.createElement("section");
        const h = document.createElement("h2");
        h.textContent = `${group} (${list.length})`;
        sec.appendChild(h);
        const grid = document.createElement("div");
        grid.className = "grid";
        list.forEach(row => {
          const sport = row.sport || "soccer";
          const demo = demoFor(row.id);
          const label = teamLabel(row);
          const a = document.createElement("a");
          a.className = "card";
          a.href = liveUrl(row, demo);
          a.target = "_blank";
          a.rel = "noopener";
          const board = document.createElement("div");
          board.className = "board";
          const primary = row.jerseyPrimary || "#111";
          const secondary = row.jerseySecondary || "#fff";
          board.style.setProperty("--jp", primary);
          board.style.setProperty("--js", secondary);
          if (row.defaultBackgroundUrl && !row.jerseyCssBack) {
            board.classList.add("photo-back");
            board.style.backgroundImage = `url("${row.defaultBackgroundUrl}")`;
            board.innerHTML = `
              <p class="team">${label}</p>
              <p class="name">${demo.name}</p>
              <p class="num">${demo.mark}</p>
            `;
          } else {
            board.innerHTML = `
              <div class="mount sport-${sport}">
                <div class="hanger"><span class="hanger-hook"></span><span class="hanger-bar"></span></div>
                <div class="garment">
                  <span class="collar"></span>
                  <span class="sleeve l"></span>
                  <span class="sleeve r"></span>
                  <span class="yoke"></span>
                  <span class="plate"></span>
                  <span class="torso"></span>
                  <span class="side l"></span>
                  <span class="side r"></span>
                </div>
              </div>
              <p class="team">${label}</p>
              <p class="name">${demo.name}</p>
              <p class="num">${demo.mark}</p>
            `;
          }
          const meta = document.createElement("div");
          meta.className = "meta";
          meta.innerHTML = `<strong>${label}</strong><span>${demo.name} · #${demo.mark} · ${row.sport.toUpperCase()}</span>`;
          a.appendChild(board);
          a.appendChild(meta);
          grid.appendChild(a);
        });
        sec.appendChild(grid);
        root.appendChild(sec);
      });
    }

    document.getElementById("q").addEventListener("input", render);
    document.getElementById("sport").addEventListener("change", render);
    render();
  </script>
</body>
</html>
