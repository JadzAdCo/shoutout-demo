<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Seed Jadz ShoutOut Clubs</title>
<link rel="stylesheet" href="./styles.css"/>
</head>
<body>
<main class="app">
  <section class="card" style="margin-top:40px">
    <p class="eyebrow">Jadz AdCo Setup</p>
    <h1>Seed Club Database</h1>
    <p class="sub">Use this once to create the Firestore club and template records. Sign in as an admin first.</p>
    <p id="signedInAs" class="status">Not signed in</p>
    <div class="auth-grid">
      <button onclick="loginGoogle()">Google Login</button>
      <button onclick="loginMicrosoft()">Microsoft Login</button>
      <button onclick="loginFacebook()">Facebook Login</button>
    </div>
    <hr/>
    <button class="primary" onclick="seedDatabase()">Create / Update Club Records</button>
    <p id="seedStatus" class="status"></p>
  </section>
</main>
<script type="module" src="./app.js?v=7"></script>
<script type="module">window.addEventListener("DOMContentLoaded",()=>window.initSeedPage());</script>
</body>
</html>
