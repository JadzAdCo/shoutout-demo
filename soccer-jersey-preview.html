<!doctype html>
<html><head><meta charset='utf-8'><title>Soccer jersey preview</title>
<style>
body{margin:0;background:#111;color:#eee;font:14px/1.3 system-ui;padding:16px}
h1{font-size:18px;margin:0 0 12px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px}
figure{margin:0;background:#1a1a1a;border:1px solid #333;padding:8px}
img{width:100%;height:280px;object-fit:contain;background:#000;display:block}
figcaption{margin-top:8px;text-align:center}
</style></head><body>
<h1>Soccer jersey assets (local)</h1>
<div class='grid'>
<figure><img src='images/soccer/soccer-morocco-back.png' alt='Morocco'><figcaption>Morocco</figcaption></figure>
<figure><img src='images/soccer/soccer-spain-back.png' alt='Spain'><figcaption>Spain</figcaption></figure>
<figure><img src='images/soccer/soccer-chelsea-back.png' alt='Chelsea'><figcaption>Chelsea</figcaption></figure>
<figure><img src='images/soccer/soccer-psg-back.png' alt='PSG'><figcaption>PSG</figcaption></figure>
<figure><img src='images/soccer/soccer-monaco-back.png' alt='Monaco'><figcaption>Monaco</figcaption></figure>
</div>
</body></html>
