<!doctype html>
<html lang="en">
<head>
  <!-- FLOQR ShoutOut Display Page v29.09.47. Use with ?location=... (optional ?ip=... / ?screen=64x32). -->
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>FLOQR ShoutOut Display</title>
  <link rel="stylesheet" href="./display.css?v=29.09.49"/>
</head>
<body class="display display-booting">
  <main id="displayCanvas" class="display-canvas">
    <div id="displayBackground" class="display-background" aria-hidden="true"></div>
    <div class="display-text-overlay">
      <div id="displayBrand" class="brand"></div>
      <div class="display-compose-slot">
        <div id="displayFrameOverlay" class="display-frame-overlay hidden" aria-hidden="true"></div>
        <div class="display-center">
          <div id="mediaSlot" class="media-slot hidden"></div>
          <div id="displayJerseyTeam" class="soccer-jersey-team hidden" aria-hidden="true"></div>
          <h1 id="displayMain"></h1>
          <h2 id="displaySub"></h2>
          <div id="displayIdentityRail" class="display-identity-rail hidden" aria-hidden="true"></div>
        </div>
      </div>
      <div class="ticker"></div>
    </div>
    <section id="heistBrandSlide" class="heist-brand-slide hidden" aria-hidden="true">
      <div class="heist-brand-slide-inner">
        <img id="heistBrandLogo" class="heist-brand-logo" alt="HEIST DC logo" decoding="async"/>
        <strong class="heist-brand-name">HEIST DC</strong>
      </div>
    </section>
  </main>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
<script src="./firebase-config.js?v=29.09.22"></script>
<script src="./shared-data.js?v=29.09.52"></script>
<script src="./jersey-catalog.js?v=29.09.52"></script>
<script src="./floqr-identity.js?v=29.09.22"></script>
<script src="./display-app.js?v=29.09.52"></script>
<script src="./notification-center.js?v=29.09.22"></script>
</body>
</html>
